# JEPA pretraining — gate=off, biased masking.
# Ablation cell (gate=off, biased) for the Phase 1 2x2 experiment.
# All other hyperparameters identical to pretrain_jepa.yaml.

model:
  name: particle_jepa
  max_num_particles: 128
  num_particle_features: 4
  embed_dim: 128
  num_heads: 8
  num_layers: 8
  dropout: 0.1
  expansion_factor: 4
  pair_embed_dims: [64, 64, 64]

  predictor:
    predictor_dim: 64
    num_heads: 4
    num_layers: 4
    dropout: 0.1

  jepa:
    ema_momentum_start: 0.996
    ema_momentum_end: 1.0
    use_attention_gate: false
    num_mask: 1
    mask_mode: biased

train:
  batch_size: 1000
  criterion:
    name: embedding_loss
    embed_dim: 128
  optimizer:
    name: radam
    lr: 0.001
    betas: [0.95, 0.999]
  optimizer_wrapper:
    name: lookahead
    la_steps: 6
    la_alpha: 0.5
  scheduler:
    name: cosine_annealing_lr
    T_max: 20
    eta_min: 0.00001
  callbacks:
    - name: early_stopping
      patience: 7
      min_delta: 0.000001
  num_epochs: 20
  start_epoch: 0
  logging_dir: ./logs
  logging_steps: 50
  progress_bar: true
  save_best: true
  save_ckpt: true
  num_workers: 8
  pin_memory: true
